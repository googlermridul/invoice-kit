name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  analyze:
    name: Analyze & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      - name: Install deps
        run: flutter pub get
      - name: Verify format
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze

  test:
    name: Tests
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      - name: Install deps
        run: flutter pub get
      - name: Run tests with coverage
        run: |
          flutter test --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

  build-android:
    name: Build Android APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      - name: Install deps
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release --dart-define=APP_ENV=production

  build-appbundle:
    name: Build Android App Bundle
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      - name: Install deps
        run: flutter pub get
      - name: Build AAB
        run: flutter build appbundle --release --dart-define=APP_ENV=production

  build-ios:
    name: Build iOS (no codesign)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      - name: Install deps
        run: flutter pub get
      - name: Build iOS
        run: flutter build ios --release --no-codesign --dart-define=APP_ENV=production